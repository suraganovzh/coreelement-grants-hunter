name: Deadline Reminders

on:
  schedule:
    - cron: '0 9 * * *'    # 9:00 AM UTC daily
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests python-dateutil pyyaml python-dotenv

      - name: Check deadlines and send reminders
        run: |
          python -c "
          import json, os, requests
          from datetime import date, timedelta

          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.getenv('TELEGRAM_CHAT_ID', '')

          if not token or not chat_id:
              print('Telegram credentials not set')
              exit(0)

          # Load analyzed grants
          try:
              with open('data/analyzed.json') as f:
                  grants = json.load(f)
                  if isinstance(grants, dict):
                      grants = grants.get('grants', [])
          except FileNotFoundError:
              print('No analyzed grants found')
              exit(0)

          today = date.today()
          reminder_days = [14, 7, 3, 1]
          reminders = []

          for grant in grants:
              deadline = grant.get('deadline', '')
              if not deadline:
                  continue
              try:
                  from dateutil import parser as dp
                  dl = dp.parse(deadline).date()
                  days_left = (dl - today).days
                  if days_left in reminder_days:
                      reminders.append((grant, days_left))
              except:
                  continue

          if not reminders:
              print('No reminders to send today')
              exit(0)

          for grant, days in reminders:
              emoji = '🚨' if days <= 1 else '⚠️' if days <= 3 else '⏰' if days <= 7 else '📅'
              msg = f\"{emoji} DEADLINE REMINDER\n\n{grant.get('title', '')[:70]}\nFunder: {grant.get('funder', '')}\nDeadline: {days} day(s) left\"
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat_id, 'text': msg}
              )
              print(f'Sent reminder: {grant.get(\"title\", \"\")[:40]} ({days}d)')

          print(f'Sent {len(reminders)} reminders')
          "
