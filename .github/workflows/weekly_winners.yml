name: Weekly Winner Analysis

on:
  schedule:
    - cron: '0 10 * * 0'      # Every Sunday 10 AM UTC
  workflow_dispatch:            # Allow manual trigger

jobs:
  scrape-winners:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      # --- Source 1: Grants.gov awards ---
      - name: Scrape grants.gov awarded grants
        run: python -m src.scrapers.winners.grants_gov_awards --days 30
        continue-on-error: true

      # --- Source 2: SBIR/STTR awards ---
      - name: Scrape SBIR Phase I awards
        run: python -m src.scrapers.winners.sbir_awards --phase 1 --days 30
        continue-on-error: true

      - name: Scrape SBIR Phase II awards
        run: python -m src.scrapers.winners.sbir_awards --phase 2 --days 90 --output data/winners_sbir_p2.json
        continue-on-error: true

      # --- Source 3: NSF awards ---
      - name: Scrape NSF awards
        run: python -m src.scrapers.winners.nsf_awards --days 90
        continue-on-error: true

      # --- Source 4: DOE awards ---
      - name: Scrape DOE awards
        run: python -m src.scrapers.winners.doe_awards --days 90
        continue-on-error: true

      # --- Source 5: NIH RePORTER ---
      - name: Scrape NIH awards
        run: python -m src.scrapers.winners.nih_reporter
        continue-on-error: true

      # --- Source 6: USASpending.gov ---
      - name: Scrape USASpending awards
        run: python -m src.scrapers.winners.usaspending --days 90
        continue-on-error: true

      # --- Source 7: SAM.gov opportunities ---
      - name: Scrape SAM.gov opportunities
        run: python -m src.scrapers.winners.sam_gov --days 30
        continue-on-error: true
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}

      # --- Extract patterns from all winners ---
      - name: Extract patterns from winners
        run: python -m src.analyzers.pattern_extractor

      - name: Commit winners and patterns
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/winners*.json data/patterns.json
          git diff-index --quiet HEAD || git commit -m "Winners & patterns update $(date +'%Y-%m-%d')"
          git push
