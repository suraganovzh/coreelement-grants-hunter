name: Monitor SBIR/STTR Status

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-sbir:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Check SBIR Status
        run: python -m src.monitors.sbir_status --output data/sbir_status.json --check-changes

      - name: Alert if Status Changed
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.monitors.alert_sbir_changes
        continue-on-error: true

      - name: Copy to docs
        run: |
          mkdir -p docs/data
          cp data/sbir_status.json docs/data/ 2>/dev/null || true

      - name: Commit status update
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/sbir_status.json docs/data/sbir_status.json
          git diff-index --quiet HEAD || git commit -m "SBIR status check $(date +'%Y-%m-%d %H:%M')"
          git push
