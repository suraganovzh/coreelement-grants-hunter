name: Daily State & Foundation Scraping

on:
  schedule:
    - cron: '0 10 * * *'  # 10 AM UTC daily (more frequent than federal)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-state-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Scrape State Grants (all states)
        run: python -m src.scrapers.state_grants.multi_state --output data/state_grants_raw.json
        continue-on-error: true

      - name: Scrape EQT Foundation
        run: python -m src.scrapers.foundations.eqt_foundation --output data/foundation_eqt_raw.json
        continue-on-error: true

      - name: Scrape Sloan Foundation
        run: python -m src.scrapers.foundations.sloan_foundation --output data/foundation_sloan_raw.json
        continue-on-error: true

      - name: Track NOFO Pipeline
        run: python -m src.scrapers.nofo_tracker --output data/nofo_pipeline.json
        continue-on-error: true

      - name: Scrape Winners (state + foundation)
        run: python -m src.scrapers.winners.expanded_winners
        continue-on-error: true

      - name: Consolidate All Grants
        run: python -m src.data.consolidate --output data/analyzed.json

      - name: Run Quality Check
        run: python -m src.validation.quality_check --input data/analyzed.json --output data/quality_report.json
        continue-on-error: true

      - name: Copy data to docs
        run: |
          mkdir -p docs/data
          cp data/analyzed.json docs/data/ 2>/dev/null || true
          cp data/nofo_pipeline.json docs/data/ 2>/dev/null || true
          cp data/sbir_status.json docs/data/ 2>/dev/null || true
          cp data/quality_report.json docs/data/ 2>/dev/null || true

      - name: Commit data updates
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/ docs/data/
          git diff-index --quiet HEAD || git commit -m "Daily state & foundation grants update $(date +'%Y-%m-%d')"
          git push

      - name: Send Telegram notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "
          from src.local.telegram_notify import send_message;
          send_message('📊 *State & Foundation scrape complete*\nCheck dashboard for updates.')
          " || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-scrape-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
