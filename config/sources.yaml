# ===========================================
# Grant Sources Configuration
# ===========================================

federal:
  grants_gov:
    name: "Grants.gov"
    url: "https://www.grants.gov"
    api_url: "https://api.grants.gov/v1/api/search"
    enabled: true
    frequency: daily
    requires_api_key: true
    rate_limit:
      calls: 100
      period: 3600  # per hour
    keywords:
      - "artificial intelligence"
      - "mining technology"
      - "critical minerals"
      - "mineral exploration"
      - "geological survey"
      - "clean energy minerals"
    funding_instruments:
      - "G"   # Grant
      - "CA"  # Cooperative Agreement
    eligible_categories:
      - "21"  # Small Business
      - "25"  # For-Profit Organization

  sbir_sttr:
    name: "SBIR/STTR"
    url: "https://www.sbir.gov"
    api_url: "https://www.sbir.gov/api/solicitations.json"
    enabled: true
    frequency: daily
    requires_api_key: false
    rate_limit:
      calls: 60
      period: 60
    target_agencies:
      - "DOE"   # Department of Energy
      - "NSF"   # National Science Foundation
      - "DOD"   # Department of Defense
      - "DOI"   # Department of Interior (USGS)
      - "EPA"   # Environmental Protection Agency
    phases:
      - "Phase I"
      - "Phase II"

  nsf:
    name: "National Science Foundation"
    url: "https://www.nsf.gov/funding/"
    enabled: true
    frequency: weekly
    requires_api_key: false
    rate_limit:
      calls: 30
      period: 60
    directorates:
      - "GEO"  # Geosciences
      - "CISE"  # Computer and Information Science
      - "ENG"  # Engineering
      - "TIP"  # Technology, Innovation and Partnerships

  doe:
    name: "Department of Energy"
    url: "https://www.energy.gov/eere/funding"
    enabled: true
    frequency: weekly
    requires_api_key: false
    rate_limit:
      calls: 30
      period: 60
    offices:
      - "EERE"   # Energy Efficiency & Renewable Energy
      - "FE"     # Fossil Energy
      - "ARPA-E" # Advanced Research Projects Agency
      - "CMI"    # Critical Materials Institute

  arpa_e:
    name: "ARPA-E"
    url: "https://arpa-e.energy.gov/technologies/open-funding-opportunities"
    enabled: true
    frequency: weekly
    requires_api_key: false

  usgs:
    name: "US Geological Survey"
    url: "https://www.usgs.gov/programs/mineral-resources-program"
    enabled: true
    frequency: weekly

private_foundations:
  foundation_directory:
    name: "Foundation Directory Online"
    url: "https://fconline.foundationcenter.org"
    enabled: false  # Requires paid subscription
    frequency: weekly

  eqt_foundation:
    name: "EQT Foundation Science Grants"
    url: "https://eqtgroup.com/eqt-foundation/"
    grants_url: "https://eqtgroup.com/eqt-foundation/grant-submission"
    enabled: true
    frequency: daily
    priority: high
    focus_areas:
      - "critical minerals"
      - "climate tech"
      - "deeptech"
      - "green transition"
    notes: "Direct alignment with Core Element AI. Partnership via CSM/Stanford."

  sloan_foundation:
    name: "Alfred P. Sloan Foundation"
    url: "https://sloan.org/programs/energy-and-environment"
    enabled: true
    frequency: weekly
    focus_areas:
      - "energy"
      - "environment"
      - "clean energy"

  google_ai:
    name: "Google AI Research Grants"
    url: "https://research.google/outreach/"
    enabled: true
    frequency: weekly

  google_org_impact:
    name: "Google.org Impact Challenges"
    url: "https://www.google.org/impact-challenges/"
    enabled: true
    frequency: daily
    priority: high
    focus_areas:
      - "AI for science"
      - "AI for social impact"
      - "climate"
      - "sustainability"
    notes: "Google.org runs large-scale AI challenges. AI for Science directly relevant to Core Element."

  microsoft_ai:
    name: "Microsoft AI for Earth"
    url: "https://www.microsoft.com/en-us/ai/ai-for-earth-grants"
    enabled: true
    frequency: weekly

  amazon_sustainability:
    name: "Amazon Sustainability"
    url: "https://sustainability.aboutamazon.com/"
    enabled: true
    frequency: weekly

