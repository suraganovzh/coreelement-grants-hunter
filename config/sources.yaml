# --- MONITORS (NEW) ---
monitors:
  sbir_sttr_status:
    name: "SBIR/STTR Authorization Status"
    url: "https://www.sbir.gov/"
    enabled: true
    frequency: every_6_hours
    priority: critical
    check_urls:
      - "https://www.sbir.gov/"
      - "https://seedfund.nsf.gov/"
      - "https://science.osti.gov/sbir"
    notes: "Programs expired Sept 30, 2025. Monitor for reauthorization."

  nofo_pipeline:
    name: "NOFO Pipeline Tracker"
    enabled: true
    frequency: daily
    sources:
      - "https://www.energy.gov/eere/funding/funding-opportunities"
      - "https://arpa-e-foa.energy.gov/"
    notes: "Track NOIs for upcoming NOFOs — prepare now opportunities."

