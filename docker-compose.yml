# Docker Compose — LOCAL DEVELOPMENT ONLY
# Production uses: GitHub Actions (scraping) + GitHub Pages (dashboard) + local ARM (analysis)
# No VPS needed.

version: '3.8'

services:
  # PostgreSQL for local development/testing
  db:
    image: postgres:16-alpine
    container_name: grant-hunter-db
    environment:
      POSTGRES_DB: grant_hunter
      POSTGRES_USER: grant_hunter
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grant_hunter"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
